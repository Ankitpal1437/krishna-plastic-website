<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krishna Plastic | Tile Fitting Tools & Hardware Manufacturer | Rajkot, Gujarat</title>
  <meta name="description" content="Krishna Plastic is a leading manufacturer of Tile Fitting Tools, Tile Leveling Systems, and Hardware Products based in Rajkot, Gujarat. Trusted by dealers, distributors and contractors across India since 2015." />
  <meta name="keywords" content="tile spacer, tile leveling system, tile jack, glass suction cup, tile tools manufacturer, Rajkot, Gujarat, hardware products" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --blue: #124E96;
      --blue-dark: #0a3570;
      --blue-light: #1a62b8;
      --green: #B7E000;
      --green-dark: #94b800;
      --white: #ffffff;
      --gray-100: #f8f9fa;
      --gray-200: #e9ecef;
      --gray-500: #6c757d;
      --gray-800: #1a1a2e;
      --gray-900: #0d0d1a;
      --font-main: 'Inter', sans-serif;
      --font-display: 'Barlow Condensed', sans-serif;
      --shadow-card: 0 4px 24px rgba(18,78,150,0.10);
      --shadow-hover: 0 12px 40px rgba(18,78,150,0.22);
      --radius: 12px;
      --transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: var(--font-main); background: var(--white); color: var(--gray-800); overflow-x: hidden; }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    /* ===== UTILITY ===== */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .section-label {
      display: inline-block;
      background: var(--green);
      color: var(--blue-dark);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      color: var(--blue-dark);
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .section-title span { color: var(--blue); }
    .section-subtitle {
      font-size: 1.05rem;
      color: var(--gray-500);
      line-height: 1.7;
      max-width: 560px;
    }
    .section-header { margin-bottom: 52px; }
    .section-header.center { text-align: center; }
    .section-header.center .section-subtitle { margin: 0 auto; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--green);
      color: var(--blue-dark);
      border-color: var(--green);
    }
    .btn-primary:hover {
      background: var(--green-dark);
      border-color: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(183,224,0,0.4);
    }
    .btn-outline {
      background: transparent;
      color: var(--white);
      border-color: rgba(255,255,255,0.5);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--white);
      transform: translateY(-2px);
    }
    .btn-blue {
      background: var(--blue);
      color: var(--white);
      border-color: var(--blue);
    }
    .btn-blue:hover {
      background: var(--blue-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(18,78,150,0.35);
    }
    .btn-wa {
      background: #25D366;
      color: #fff;
      border-color: #25D366;
    }
    .btn-wa:hover {
      background: #1ebe5d;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37,211,102,0.4);
    }

    /* ===== NAVBAR ===== */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(10,53,112,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(183,224,0,0.15);
      transition: var(--transition);
    }
    #navbar.scrolled {
      background: rgba(10,53,112,0.98);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 74px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: var(--green);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--blue-dark);
      flex-shrink: 0;
    }
    .nav-logo-text { line-height: 1.15; }
    .nav-logo-name {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.02em;
    }
    .nav-logo-name span { color: var(--green); }
    .nav-logo-tag {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-links a {
      color: rgba(255,255,255,0.80);
      font-size: 0.88rem;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 6px;
      transition: var(--transition);
    }
    .nav-links a:hover {
      color: var(--green);
      background: rgba(183,224,0,0.08);
    }
    .nav-cta {
      background: var(--green);
      color: var(--blue-dark) !important;
      font-weight: 700 !important;
      padding: 8px 18px !important;
    }
    .nav-cta:hover {
      background: var(--green-dark) !important;
      color: var(--blue-dark) !important;
    }
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
    }
    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: var(--transition);
    }

    /* ===== HERO ===== */
    #hero {
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(10,53,112,0.96) 0%, rgba(18,78,150,0.90) 50%, rgba(10,53,112,0.97) 100%),
        url('images/hero_cover.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding-top: 74px;
    }
    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(183,224,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(183,224,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(183,224,0,0.12) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      padding: 80px 0;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(183,224,0,0.12);
      border: 1px solid rgba(183,224,0,0.3);
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
    .hero-badge i { font-size: 0.7rem; }
    .hero-headline {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.08;
      margin-bottom: 20px;
    }
    .hero-headline .accent { color: var(--green); }
    .hero-sub {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.72);
      line-height: 1.75;
      margin-bottom: 36px;
      max-width: 520px;
    }
    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 48px;
    }
    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .hero-stat { border-left: 3px solid var(--green); padding-left: 16px; }
    .hero-stat-num {
      font-family: var(--font-display);
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }
    .hero-stat-num span { color: var(--green); }
    .hero-stat-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 3px;
    }
    .hero-visual {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .hero-card-main {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      overflow: hidden;
    }
    .hero-card-main img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }
    .hero-card-label {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hero-card-label span {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--white);
    }
    .hero-card-label .tag {
      background: var(--green);
      color: var(--blue-dark);
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .hero-cards-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .hero-mini-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      overflow: hidden;
    }
    .hero-mini-card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
    }
    .hero-mini-label {
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }

    /* ===== TRUST BAR ===== */
    #trust {
      background: var(--blue-dark);
      border-top: 3px solid var(--green);
      padding: 22px 0;
    }
    .trust-inner {
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.80);
      font-size: 0.88rem;
      font-weight: 500;
    }
    .trust-item i {
      color: var(--green);
      font-size: 1.1rem;
    }

    /* ===== ABOUT ===== */
    #about { padding: 100px 0; background: var(--gray-100); }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 70px;
      align-items: center;
    }
    .about-img-block { position: relative; }
    .about-img-main {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-hover);
    }
    .about-img-main img {
      width: 100%;
      height: 380px;
      object-fit: cover;
    }
    .about-badge-float {
      position: absolute;
      bottom: -24px;
      right: -24px;
      background: var(--green);
      color: var(--blue-dark);
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 8px 32px rgba(183,224,0,0.4);
      text-align: center;
    }
    .about-badge-float .num {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }
    .about-badge-float .lbl {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      opacity: 0.8;
    }
    .about-text p {
      font-size: 1rem;
      color: var(--gray-500);
      line-height: 1.8;
      margin-bottom: 16px;
    }
    .about-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 28px;
    }
    .about-feature {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .about-feature i {
      color: var(--blue);
      font-size: 1rem;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .about-feature-text { font-size: 0.88rem; font-weight: 600; color: var(--gray-800); }

    /* ===== PRODUCTS ===== */
    #products { padding: 100px 0; background: var(--white); }
    .products-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 9px 22px;
      border-radius: 8px;
      border: 2px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-500);
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }
    .product-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
    }
    .product-card:hover {
      border-color: var(--blue);
      box-shadow: var(--shadow-hover);
      transform: translateY(-6px);
    }
    .product-img {
      height: 200px;
      overflow: hidden;
      background: var(--gray-100);
      position: relative;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product-card:hover .product-img img { transform: scale(1.07); }
    .product-cat-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--blue);
      color: var(--white);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 4px;
    }
    .product-body { padding: 18px; }
    .product-name {
      font-family: var(--font-display);
      font-size: 1.18rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 6px;
    }
    .product-app {
      font-size: 0.82rem;
      color: var(--gray-500);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .product-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .spec-tag {
      background: rgba(18,78,150,0.07);
      color: var(--blue);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 4px;
    }
    .product-card-footer {
      padding: 12px 18px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inquiry-link {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: var(--transition);
    }
    .inquiry-link:hover { color: var(--blue-dark); gap: 8px; }
    .product-hidden { display: none !important; }

    /* ===== WHY CHOOSE US ===== */
    #why {
      padding: 100px 0;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
      position: relative;
      overflow: hidden;
    }
    #why::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    #why .section-title { color: var(--white); }
    #why .section-subtitle { color: rgba(255,255,255,0.65); }
    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
      margin-top: 52px;
    }
    .why-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 30px;
      transition: var(--transition);
    }
    .why-card:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(183,224,0,0.4);
      transform: translateY(-4px);
    }
    .why-icon {
      width: 52px;
      height: 52px;
      background: rgba(183,224,0,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .why-icon i { color: var(--green); font-size: 1.4rem; }
    .why-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }
    .why-desc { font-size: 0.9rem; color: rgba(255,255,255,0.60); line-height: 1.7; }

    /* ===== INDUSTRIES ===== */
    #industries { padding: 100px 0; background: var(--gray-100); }
    .industry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }
    .industry-card {
      background: var(--white);
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      transition: var(--transition);
      cursor: default;
    }
    .industry-card:hover {
      border-color: var(--blue);
      box-shadow: var(--shadow-card);
      transform: translateY(-4px);
    }
    .industry-card:hover .ind-icon { background: var(--blue); }
    .industry-card:hover .ind-icon i { color: var(--white); }
    .ind-icon {
      width: 58px;
      height: 58px;
      background: rgba(18,78,150,0.08);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      transition: var(--transition);
    }
    .ind-icon i { color: var(--blue); font-size: 1.4rem; transition: var(--transition); }
    .ind-name { font-weight: 700; font-size: 0.95rem; color: var(--gray-800); }

    /* ===== EXPORTS ===== */
    #exports { padding: 80px 0; background: var(--white); }
    .export-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }
    .export-text { flex: 1; min-width: 260px; }
    .export-countries {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .country-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-100);
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 0.88rem;
      transition: var(--transition);
    }
    .country-chip:hover { border-color: var(--blue); background: rgba(18,78,150,0.05); }
    .country-chip i { color: var(--blue); }
    .export-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .exp-stat {
      text-align: center;
      pa
